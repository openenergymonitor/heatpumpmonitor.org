# Base docker compose, added to by docker-compose.override or docker-compose.prod. See Readme.md

services:
  # PHP & apache container using offical Docker PHP iamge
  web:
    build: .
    links:
      - db
      - emoncms
      - redis
    ports:
      # Expose heatpumpmonitor on localhost port 8080
      - 8080:80
    volumes:
      # Mount heatpumpmonitor files from local FS for dev
      - ./www:/var/www/heatpumpmonitororg
    working_dir: /var/www/heatpumpmonitororg
    env_file:
      - 'default.docker-env'
    environment:
      # Base URL for Emoncms API (service name on compose network); override via host .env if needed
      EMONCMS_HOST: ${EMONCMS_HOST:-http://emoncms}
      # Redis used by system_model.php for feed last-updated lookups (shared with emoncms)
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      load_dev_env_data:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # Always-run loader: imports the Emoncms phpfina test feeds and creates the MyHeatpump app
  # (which provisions the `myheatpump_daily_stats` table on the emoncms DB via postprocess).
  # Idempotent — exits early if the user already has feeds + a myheatpump app. Pass
  # TESTDATASET_FORCE=1 to bypass the guard and re-run the import.
  load_emoncms_testdata:
    image: ghcr.io/jeremypoulter/emoncms:pr-1
    user: "0:0"
    entrypoint: ["/bin/bash", "/bootstrap/run.sh"]
    env_file:
      - "emoncms.docker-env"
    environment:
      EMONCMS_HOST: ${EMONCMS_HOST:-http://emoncms}
      TESTDATASET_EMONCMS_USER_ID: ${TESTDATASET_EMONCMS_USER_ID:-1}
      TESTDATASET_FORCE: ${TESTDATASET_FORCE:-0}
      PHP_CLI_MEMORY_LIMIT: ${PHP_CLI_MEMORY_LIMIT:-1024M}
      HPM_APP_NAME: ${HPM_APP_NAME:-My Heatpump}
    volumes:
      - emon-phpfina:/var/opt/emoncms/phpfina
      - ${TESTDATASET_PATH:-../testdataset}:/testdataset:ro
      - ./docker/testdataset/scripts-settings.php:/bootstrap/scripts-settings.php:ro
      - ./docker/testdataset/run.sh:/bootstrap/run.sh:ro
      - ./docker/testdataset/check_loaded.php:/bootstrap/check_loaded.php:ro
      - ./docker/testdataset/bootstrap_admin.php:/bootstrap/bootstrap_admin.php:ro
      - ./docker/testdataset/configure_hpm_app.php:/bootstrap/configure_hpm_app.php:ro
    links:
      - db
      - redis
      - mqtt
      - emoncms
    depends_on:
      emoncms:
        condition: service_healthy

  # This container will load the data (if requested) and then stop
  load_dev_env_data:
    build: .
    links:
      - db
    volumes:
      - ./www:/var/www/heatpumpmonitororg
      - ./dev_env/load_dev_env_data.php:/var/load_dev_env_data.php:ro
      - ./load_installer_logos.php:/var/load_installer_logos.php:ro
      - ./generate_thumbnails.php:/var/generate_thumbnails.php:ro
    working_dir: /var/www/heatpumpmonitororg
    env_file:
      - 'default.docker-env'
    environment:
      - "EMONCMS_HOST=${EMONCMS_HOST:-http://emoncms}"
      # Used by step 3c (system_meta.app_id linking) when load_emoncms_testdata has run before us
      - "HPM_APP_NAME=${HPM_APP_NAME:-My Heatpump}"
      # Dont reload all data, just users and system meta data
      - "RELOAD_ALL=0"
      # Clear database before loading data
      - "CLEAR_DB=0"
      # Load the users
      - "LOAD_USERS=1"
      # Load system meta data
      - "LOAD_SYSTEM_META=1"
      # Loading running stats is enough to provide the list of systems
      - "LOAD_RUNNING_STATS=1"
      # Use only when required, this is slow and uses server bandwidth
      - "LOAD_MONTHLY_STATS=0"
      #- "LOAD_MONTHLY_STATS=[1,2,204,789]"
      # Use only when required, this is even slower and uses server bandwidth
      - "LOAD_DAILY_STATS=0"
      #- "LOAD_DAILY_STATS=[1,2,204,789]"
      # Load the manufacturers
      - "LOAD_MANUFACTURERS=1"
      # Load the heatpump models
      - "LOAD_HEATPUMP_MODELS=1"
    # working_dir: /var/www/heatpumpmonitororg  # Set the working directory
    entrypoint: ["bash", "-c", "php /var/load_dev_env_data.php && php /var/generate_thumbnails.php "]
    depends_on:
      db:
        condition: service_healthy
      emoncms:
        condition: service_healthy
      # load_emoncms_testdata always runs (idempotent; exits early when already loaded), so we
      # can wait for it unconditionally to ensure the myheatpump app + daily-stats table exist
      # before step 3c links system_meta.app_id and step 5 populates daily stats.
      load_emoncms_testdata:
        condition: service_completed_successfully

  emoncms:
    image: ghcr.io/jeremypoulter/emoncms:pr-1
    ports:
      - 8081:80
    volumes:
      - emon-phpfina:/var/opt/emoncms/phpfina
      - emon-phptimeseries:/var/opt/emoncms/phptimeseries
      # Override baked-in sql_ready (mysqladmin ping); see emoncms-docker web/sql_ready.sh — remove after image rebuild
      - ./docker/emoncms-sql_ready.sh:/opt/openenergymonitor/sql_ready.sh:ro
      # Fix sync_upload cwd/symlink (see emoncms-docker web/sync_upload-run.sh) — remove after image rebuild
      - ./docker/emoncms-sync_upload-run.sh:/etc/s6-overlay/s6-rc.d/sync_upload/run:ro
      # service-runner.py uses localhost by default; use REDIS_HOST (see emoncms-docker web/service-runner.py)
      - ./docker/emoncms-service-runner.py:/var/www/emoncms/scripts/services/service-runner/service-runner.py:ro
    links:
      - db
      - redis
      - mqtt
    env_file:
      - 'emoncms.docker-env'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Apache starts only after sql_ready (s6: emoncms_pre → sql_ready → apache2), so HTTP up ⇒ DB schema applied
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s

  # Same base as emoncms-docker docker-compose.yml db (mariadb:11.0 + MARIADB_* env); plus:
  # default.docker-env (MYSQL_USER/PASSWORD/DATABASE for init), emoncms-init.sql, publish 3306, healthcheck
  db:
    image: mariadb:11.0
    environment:
      - "MYSQL_HOST=localhost"
      - "MARIADB_AUTO_UPGRADE=1"
      - "MARIADB_INITDB_SKIP_TZINFO=1"
    env_file:
      - 'default.docker-env'
    volumes:
      - emon-db-data:/var/lib/mysql
      - ./docker/emoncms-init.sql:/docker-entrypoint-initdb.d/02-emoncms.sql:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD",
          "/usr/local/bin/healthcheck.sh",
          "--su-mysql",
          "--connect",
          "--innodb_initialized"
        ]
      interval: 1s
      start_period: 60s
      timeout: 2s
      retries: 10

  redis:
    image: redis:7.0
    volumes:
      - emon-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"

  mqtt:
    image: eclipse-mosquitto:2.0
    volumes:
      - ./docker/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    command:
      - /bin/sh
      - -c
      - |
        touch /mosquitto/config/passwd
        /usr/bin/mosquitto_passwd -b /mosquitto/config/passwd emonpi emonpimqtt2016
        exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
    ports:
      - 1883:1883
    logging:
      driver: json-file
      options:
        max-size: "10m"

volumes:
  emon-db-data:
    driver: local
  emon-phpfina:
    driver: local
  emon-phptimeseries:
    driver: local
  emon-redis-data:
    driver: local
